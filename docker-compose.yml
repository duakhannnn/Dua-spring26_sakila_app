version: '3.8'

services:
  db:
    image: mysql:5.7
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: sakila
    volumes:
      - sakila-data:/var/lib/mysql
    networks:
      - sakila-network

  app:
    build: .
    container_name: flask-app
    restart: always
    ports:
      - "5000:5000"
    environment:
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_PASSWORD: admin
      MYSQL_DB: sakila
    depends_on:
      - db
    networks:
      - sakila-network

volumes:
  sakila-data:

networks:
  sakila-network: